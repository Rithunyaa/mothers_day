<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
  margin: 0; 
  overflow: hidden;
  background-color: #f5f4f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#container {
  position: relative;
  display: inline-block;
  flex: 1;  /* ← this makes the container take up remaining space after the title */
  display: flex;
  justify-content: center;
  align-items: center;
}


    #background {
  display: block;
  max-height: 80vh;  /* ← leaves room for the title at the top */
  max-width: 100vw;
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}

    #envelope {
      position: absolute;
      width: 60%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%) rotate(5deg);
      animation: wobble 2s ease-in-out infinite;
      transition: transform 0.3s ease; /* smooth hover effect */
      cursor: pointer;
    }

    @keyframes wobble {
  0%   { transform: translate(-50%, -40%) rotate(2deg); }
  50%  { transform: translate(-50%, -40%) rotate(8deg); }
  100% { transform: translate(-50%, -40%) rotate(2deg); }
}

#envelope:hover {
  transform: translate(-50%, -40%) scale(1.08) rotate(5deg);
  animation-play-state: paused; /* stops wobble while hovering */
}

  </style>
</head>
<body>
  <div id="container">
    <img src="assets/Background_1.png" id="background">
    <img src="assets/Envelope.png" id="envelope">
  </div>
  
  <script>
  document.getElementById('envelope').addEventListener('click', function() {
    document.getElementById('background').src = 'assets/background_2.png';
    document.getElementById('envelope').style.display = 'none';
    
  });
</script>

</body>
</html>
