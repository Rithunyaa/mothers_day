<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
  margin: 0; 
  overflow: hidden;
  background-color: #f5f4f0;
}

    #background {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      position: fixed;
      top: 0; left: 0;
    }

    #envelope {
      position: absolute;
      width: 400px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -40%);
    }
  </style>
</head>
<body>
  <img src="assets/Background_1.png" id="background">
  <img src="assets/Envelope.png" id="envelope">
</body>
</html>
