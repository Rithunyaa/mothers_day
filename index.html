<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      margin: 0; 
      overflow: hidden;
      background-color: #f5f4f0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #inner {
      position: relative;
      display: inline-block;
      margin-top: 20vh;
    }

    #background {
      display: block;
      max-height: calc(100vh - 15vh);
      max-width: 100vw;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    #envelope {
      position: absolute;
      width: 60%;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(5deg);
      animation: wobble 2s ease-in-out infinite;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    @keyframes wobble {
      0%   { transform: translate(-50%, -50%) rotate(2deg); }
      50%  { transform: translate(-50%, -50%) rotate(8deg); }
      100% { transform: translate(-50%, -50%) rotate(2deg); }
    }

    #envelope:hover {
      transform: translate(-50%, -50%) scale(1.08) rotate(5deg);
      animation-play-state: paused;
    }

    @font-face {
      font-family: 'MountainsOfChristmas';
      src: url('assets/Mountains_of_Christmas/MountainsofChristmas-Regular.ttf');
    }

    #title {
      font-family: 'MountainsOfChristmas', 'Times New Roman', Times, serif;
      color: #34220b;
      font-size: 10vh;
      margin: 0;
      margin-bottom: -125px;
      letter-spacing: 2px;
      text-align: center;
    }

    #nextbtn {
      font-family: serif;
      color: #ad237c;
      font-size: 4vh;
      cursor: pointer;
      transition: transform 0.2s ease;
      position: absolute;
      bottom: 9%;
      right: 9%;
      z-index: 10;
    }

    #nextbtn:hover {
      transform: scale(1.15);
    }

    .photo {
  position: fixed;
  width: 18vw;
  height: 18vw;
  object-fit: cover;    /* crops photo to fit the box, no stretching */
  border: 6px solid white;
  box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
}

    #prevArrow, #nextArrow {
      display: none;
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 5vh;
      cursor: pointer;
      color: #34220b;
      font-family: 'MountainsOfChristmas', serif;
      z-index: 100;
      transition: transform 0.2s ease;
    }

    #prevArrow { left: 2%; }
    #nextArrow { right: 2%; }

    #prevArrow:hover, #nextArrow:hover {
      transform: translateY(-50%) scale(1.2);
    }

  </style>
</head>
<body>
  <h1 id="title">Happy Mother's Day!</h1>
  <div id="inner">
    <img src="assets/Background_1.png" id="background">
    <img src="assets/Envelope.png" id="envelope">
    <p id="nextbtn" style="display:none">Next</p>
  </div>
  <p id="prevArrow">←</p>
  <p id="nextArrow">→</p>

  <script>
    const pages = [
      // Page 1
      ['images/photo3.bmp', 'images/Aaditya 002.jpg', 'images/Image(1003).jpg', 'images/DSC00324.JPG'],
      // Page 2
      ['assets/photo4.png', 'assets/photo5.png', 'assets/photo6.png'],
      // Page 3
      ['assets/photo7.png', 'assets/photo8.png', 'assets/photo9.png'],
    ];

    let currentPage = 0;

    function showPage(pageIndex) {
  document.querySelectorAll('.photo').forEach(p => p.remove());

  const photos = pages[pageIndex];
  const count = photos.length;

  // fixed positions for up to 5 photos — guaranteed no overlap
  const positions = [
    { left: 5,  top: 8  },
    { left: 28, top: 8  },
    { left: 51, top: 8  },
    { left: 74, top: 8  },
    { left: 16, top: 55 },
    { left: 55, top: 55 },
  ];

  const tilts = [-4, 3, -2, 5, -3, 4];

  photos.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.classList.add('photo');
    img.style.left = positions[i].left + 'vw';
    img.style.top = positions[i].top + 'vh';
    img.style.transform = `rotate(${tilts[i]}deg)`;
    document.body.appendChild(img);
  });

  document.getElementById('prevArrow').style.display = pageIndex === 0 ? 'none' : 'block';
  document.getElementById('nextArrow').style.display = pageIndex === pages.length - 1 ? 'none' : 'block';
}

    document.getElementById('envelope').addEventListener('click', function() {
      document.getElementById('background').src = 'assets/written_letter.png';
      document.getElementById('envelope').style.display = 'none';
      document.getElementById('title').style.display = 'none';
      document.body.style.backgroundColor = '#fff3f3';
      document.getElementById('inner').style.marginTop = '0';
      document.getElementById('background').style.maxHeight = '100vh';
      document.getElementById('background').style.maxWidth = '100vw';
      document.getElementById('background').style.width = '100vw';
      document.getElementById('background').style.height = '100vh';
      document.getElementById('nextbtn').style.display = 'block';
    });

    document.getElementById('nextbtn').addEventListener('click', function() {
      document.getElementById('inner').style.display = 'none';
      document.body.style.backgroundImage = 'url(assets/background_3.png)';
      document.body.style.backgroundRepeat = 'repeat';
      document.body.style.backgroundSize = 'auto';
      document.body.style.backgroundColor = '';
      showPage(0);
    });

    document.getElementById('nextArrow').addEventListener('click', function() {
      if (currentPage < pages.length - 1) {
        currentPage++;
        showPage(currentPage);
      }
    });

    document.getElementById('prevArrow').addEventListener('click', function() {
      if (currentPage > 0) {
        currentPage--;
        showPage(currentPage);
      }
    });
  </script>
</body>
</html>
