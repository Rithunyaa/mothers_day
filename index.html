<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      margin: 0; 
      overflow: hidden;
      background-color: #f5f4f0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #inner {
      position: relative;
      display: inline-block;
      margin-top: 20vh;
    }

    #background {
      display: block;
      max-height: calc(100vh - 15vh);
      max-width: 100vw;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    #envelope {
      position: absolute;
      width: 60%;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(5deg);
      animation: wobble 2s ease-in-out infinite;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    @keyframes wobble {
      0%   { transform: translate(-50%, -50%) rotate(2deg); }
      50%  { transform: translate(-50%, -50%) rotate(8deg); }
      100% { transform: translate(-50%, -50%) rotate(2deg); }
    }

    #envelope:hover {
      transform: translate(-50%, -50%) scale(1.08) rotate(5deg);
      animation-play-state: paused;
    }

    @font-face {
      font-family: 'MountainsOfChristmas';
      src: url('assets/Mountains_of_Christmas/MountainsofChristmas-Regular.ttf');
    }

    #title {
      font-family: 'MountainsOfChristmas', 'Times New Roman', Times, serif;
      color: #34220b;
      font-size: 10vh;
      margin: 0;
      margin-bottom: -125px;
      letter-spacing: 2px;
      text-align: center;
    }

    #nextbtn {
      font-family: 'MountainsOfChristmas', serif;
      color: #ad237c;
      font-size: 4vh;
      cursor: pointer;
      transition: transform 0.2s ease;
      position: absolute;
      bottom: 9%;
      right: 9%;
      z-index: 10;
    }

    #nextbtn:hover {
      transform: scale(1.15);
    }

    .photo-wrapper {
      position: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .photo {
      width: 22vw;
      height: 22vw;
      object-fit: cover;
      border: 6px solid white;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }

    .caption {
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif, serif;
      color: #34220b;
      font-size: 4vh;
      margin-top: 8px;
      text-align: center;
      max-width: 22vw;
    }

    #prevArrow, #nextArrow {
      display: none;
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 5vh;
      cursor: pointer;
      color: #34220b;
      font-family: 'MountainsOfChristmas', serif;
      z-index: 100;
      transition: transform 0.2s ease;
    }

    #prevArrow { left: 2%; }
    #nextArrow { right: 2%; }

    #prevArrow:hover, #nextArrow:hover {
      transform: translateY(-50%) scale(1.2);
    }

  </style>
</head>
<body>
  <h1 id="title">Happy Mother's Day!</h1>
  <div id="inner">
    <img src="assets/Background_1.png" id="background">
    <img src="assets/Envelope.png" id="envelope">
    <p id="nextbtn" style="display:none">Next</p>
  </div>
  <p id="prevArrow">←</p>
  <p id="nextArrow">→</p>

  <script>
    const pages = [
  // Page 1
  [
    { src: 'images/photo3.bmp',  },
    { src: 'images/Image(1003).jpg'},
    { src: 'images/IMG_2535.JPG' },
  ],
  // Page 2
  [
    { src: 'images/Image(991).jpg'},
    { src: 'images/DSC00011.jpg' },
    { src: 'images/IMG_2996.JPG' },
  ],
  // Page 3
  [
    { src: 'images/DSC00590.jpg' },
    { src: 'images/DSC00324.JPG' },
    { src: 'images/Image(922).jpg' },
  ],
  // Page 4
  [
    { src: 'images/ADVENTURE 143.jpg' },
    { src: 'images/ADVENTURE 246.jpg' },
    { src: 'images/IMG_2311.jpg' },
  ],
  // Page 4
  [
    { src: 'images/ADVENTURE 143.jpg' },
    { src: 'images/ADVENTURE 246.jpg' },
    { src: 'images/IMG_2311.jpg' },
  ],
];


    let currentPage = 0;

    function showPage(pageIndex) {
      document.querySelectorAll('.photo-wrapper').forEach(p => p.remove());

      const photos = pages[pageIndex];

      const positions = [
        { left: 8,  top: 20 },
        { left: 37, top: 20 },
        { left: 66, top: 20 },
      ];

      const tilts = [-4, 3, -2];

      photos.forEach((item, i) => {
        const wrapper = document.createElement('div');
        wrapper.classList.add('photo-wrapper');
        wrapper.style.left = positions[i].left + 'vw';
        wrapper.style.top = positions[i].top + 'vh';
        wrapper.style.transform = `rotate(${tilts[i]}deg)`;

        const img = document.createElement('img');
        img.src = item.src;
        img.classList.add('photo');

        const caption = document.createElement('p');
        caption.classList.add('caption');
        caption.textContent = item.caption;

        wrapper.appendChild(img);
        wrapper.appendChild(caption);
        document.body.appendChild(wrapper);
      });

      document.getElementById('prevArrow').style.display = pageIndex === 0 ? 'none' : 'block';
      document.getElementById('nextArrow').style.display = 'block';
    }

    document.getElementById('envelope').addEventListener('click', function() {
      document.getElementById('background').src = 'assets/written_letter.png';
      document.getElementById('envelope').style.display = 'none';
      document.getElementById('title').style.display = 'none';
      document.body.style.backgroundColor = '#fff3f3';
      document.getElementById('inner').style.marginTop = '0';
      document.getElementById('background').style.maxHeight = '100vh';
      document.getElementById('background').style.maxWidth = '100vw';
      document.getElementById('background').style.width = '100vw';
      document.getElementById('background').style.height = '100vh';
      document.getElementById('nextbtn').style.display = 'block';
    });

    document.getElementById('nextbtn').addEventListener('click', function() {
      document.getElementById('inner').style.display = 'none';
      document.body.style.backgroundImage = 'url(assets/background_3.png)';
      document.body.style.backgroundRepeat = 'repeat';
      document.body.style.backgroundSize = 'auto';
      document.body.style.backgroundColor = '';
      showPage(0);
    });

    document.getElementById('nextArrow').addEventListener('click', function() {
      currentPage++;
      showPage(currentPage);
    });

    document.getElementById('prevArrow').addEventListener('click', function() {
      if (currentPage > 0) {
        currentPage--;
        showPage(currentPage);
      }
    });
  </script>
</body>
</html>
